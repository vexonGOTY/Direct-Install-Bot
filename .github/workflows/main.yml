name: Generate & Publish Manifest

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct link to signed IPA"
        required: true
      bundleid:
        description: "Bundle-ID"
        required: true
      version:
        description: "App Version"
        required: true
      appname:
        description: "App Name"
        required: true
      cleanup_old:
        description: "Replace previous manifest?"
        type: boolean
        required: true
        default: false
      folder_name:
        description: "Folder name (used if replace is NOT selected)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare manifest safely
        run: |
          set -e

          TEMP_DIR=$(mktemp -d)

          FILE=$(find . -name "manifest.plist" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "manifest.plist not found"
            exit 1
          fi

          cp "$FILE" "$TEMP_DIR/manifest.plist"

          sed -i "s|put ur SIGNED DIRECT link here|${{ github.event.inputs.url }}|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the bundle id of the app here|${{ github.event.inputs.bundleid }}|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the app version here|${{ github.event.inputs.version }}|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the app display name here|${{ github.event.inputs.appname }}|g" "$TEMP_DIR/manifest.plist"

          echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

      - name: Checkout or create generated branch
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git ls-remote --exit-code --heads origin generated; then
            git checkout generated
          else
            git checkout --orphan generated
            git rm -rf .
          fi

      - name: Store manifest
        run: |
          set -e

          CLEANUP=${{ github.event.inputs.cleanup_old }}
          FOLDER="${{ github.event.inputs.folder_name }}"

          if [ ! -f "$TEMP_DIR/manifest.plist" ]; then
            echo "Prepared manifest not found."
            exit 1
          fi

          if [ "$CLEANUP" = "true" ]; then
            rm -rf *
            mv "$TEMP_DIR/manifest.plist" manifest.plist
            FINAL_PATH="manifest.plist"
          else
            if [ -z "$FOLDER" ]; then
              FOLDER=$(date +%Y-%m-%d_%H-%M-%S)
            fi
            mkdir -p "$FOLDER"
            mv "$TEMP_DIR/manifest.plist" "$FOLDER/manifest.plist"
            FINAL_PATH="$FOLDER/manifest.plist"
          fi

          echo "FINAL_PATH=$FINAL_PATH" >> $GITHUB_ENV

          git add .
          git commit -m "Generated manifest: $FINAL_PATH" || echo "No changes"
          git push origin generated

      - name: Create install link
        run: |
          set -e

          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/generated/${FINAL_PATH}"
          ITMS_LINK="itms-services://?action=download-manifest&url=${RAW_URL}"

          {
            echo "## Install Link"
            echo ""
            echo "[![INSTALL APP](https://img.shields.io/badge/INSTALL%20APP-blue?style=for-the-badge)](${ITMS_LINK})"
            echo ""
            echo "---"
            echo ""
            echo "### Copyable Link"
            echo ""
            echo '```'
            echo "${ITMS_LINK}"
            echo '```'
            echo ""
            echo "<button onclick=\"navigator.clipboard.writeText('${ITMS_LINK}')\">Copy Link</button>"
          } >> $GITHUB_STEP_SUMMARY
