name: Update Manifest Plist

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Link for the signed IPA"
        required: true
      bundleid:
        description: "the Bundle-ID of your App"
        required: true
      version:
        description: "the version your App is on"
        required: true
      appname:
        description: "the name of your App"
        required: true

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Replace placeholders in manifest.plist
        run: |
          sed -i "s|put ur SIGNED DIRECT link here|${{ github.event.inputs.url }}|g" manifest.plist
          sed -i "s|put the bundle id of the app here|${{ github.event.inputs.bundleid }}|g" manifest.plist
          sed -i "s|put the app version here (the one in the plist, not the appstore, they dont match sometimes)|${{ github.event.inputs.version }}|g" manifest.plist
          sed -i "s|put the app display name here (what shows on ur homescreen)|${{ github.event.inputs.appname }}|g" manifest.plist

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifest.plist
          git commit -m "Updated manifest.plist via workflow" || echo "No changes to commit"
          git push
