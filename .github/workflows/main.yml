name: Generate & Publish Manifest

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Link for the signed IPA"
        required: true
      bundleid:
        description: "Bundle-ID of the App"
        required: true
      version:
        description: "App Version"
        required: true
      appname:
        description: "App Display Name"
        required: true
      cleanup_old:
        description: "Delete previous manifest and replace it? (true/false)"
        required: true
        default: "false"
      folder_name:
        description: "Folder name (used only if cleanup_old=false)"
        required: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and copy manifest
        run: |
          FILE=$(find . -name "manifest.plist" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "manifest.plist not found!"
            exit 1
          fi
          cp "$FILE" manifest_generated.plist

      - name: Replace placeholders
        run: |
          sed -i "s|put ur SIGNED DIRECT link here|${{ github.event.inputs.url }}|g" manifest_generated.plist
          sed -i "s|put the bundle id of the app here|${{ github.event.inputs.bundleid }}|g" manifest_generated.plist
          sed -i "s|put the app version here (the one in the plist, not the appstore)|${{ github.event.inputs.version }}|g" manifest_generated.plist
          sed -i "s|put the app display name here|${{ github.event.inputs.appname }}|g" manifest_generated.plist

      - name: Switch to generated branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git ls-remote --exit-code --heads origin generated; then
            git checkout generated
          else
            git checkout --orphan generated
            git rm -rf .
          fi

      - name: Store manifest
        run: |
          CLEANUP="${{ github.event.inputs.cleanup_old }}"
          FOLDER="${{ github.event.inputs.folder_name }}"

          if [ "$CLEANUP" = "true" ]; then
            echo "Replacing previous manifest"
            rm -f manifest.plist
            mv ../manifest_generated.plist manifest.plist
            FINAL_PATH="manifest.plist"
          else
            if [ -z "$FOLDER" ]; then
              FOLDER=$(date +%Y-%m-%d_%H-%M-%S)
            fi
            mkdir -p "$FOLDER"
            mv ../manifest_generated.plist "$FOLDER/manifest.plist"
            FINAL_PATH="$FOLDER/manifest.plist"
          fi

          echo "FINAL_PATH=$FINAL_PATH" >> $GITHUB_ENV

          git add .
          git commit -m "Generated manifest ${FINAL_PATH}" || echo "No changes"
          git push origin generated

      - name: Generate Install Link
        run: |
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/generated/${FINAL_PATH}"
          ITMS_LINK="itms-services://?action=download-manifest&url=${RAW_URL}"

          echo "INSTALL_LINK=$ITMS_LINK" >> $GITHUB_ENV

          echo "## Install Link" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[INSTALL APP](${ITMS_LINK})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Direct Link (copyable):" >> $GITHUB_STEP_SUMMARY
          echo "\`${ITMS_LINK}\`" >> $GITHUB_STEP_SUMMARY
