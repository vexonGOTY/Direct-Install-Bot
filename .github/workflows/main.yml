name: Generate & Publish Manifest

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct link to signed IPA"
        required: true
      bundleid:
        description: "Bundle-ID"
        required: true
      version:
        description: "App Version"
        required: true
      appname:
        description: "App Name"
        required: true
      cleanup_old:
        description: "Replace previous manifest?"
        type: boolean
        required: true
        default: false
      folder_name:
        description: "Folder name"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare manifest safely
        shell: bash
        run: |
          set -euo pipefail

          TEMP_DIR=$(mktemp -d)

          FILE=$(find . -type f -name "manifest.plist" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "manifest.plist not found"
            exit 1
          fi

          cp "$FILE" "$TEMP_DIR/manifest.plist"

          escape() {
            printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          URL_ESCAPED=$(escape "${{ github.event.inputs.url }}")
          BUNDLE_ESCAPED=$(escape "${{ github.event.inputs.bundleid }}")
          VERSION_ESCAPED=$(escape "${{ github.event.inputs.version }}")
          APPNAME_ESCAPED=$(escape "${{ github.event.inputs.appname }}")

          sed -i "s|PPP|$URL_ESCAPED|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the bundle id of the app here|$BUNDLE_ESCAPED|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the app version here (the one in the plist, not the appstore, they dont match sometimes)|$VERSION_ESCAPED|g" "$TEMP_DIR/manifest.plist"
          sed -i "s|put the app display name here (what shows on ur homescreen)|$APPNAME_ESCAPED|g" "$TEMP_DIR/manifest.plist"

          echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

      - name: Checkout or create generated branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git show-ref --verify --quiet refs/heads/generated; then
            git checkout generated
            git pull origin generated
          else
            git checkout --orphan generated
            git rm -rf . || true
            git commit --allow-empty -m "Initialize generated branch"
            git push origin generated
          fi

      - name: Store manifest
        shell: bash
        run: |
          set -euo pipefail

          CLEANUP="${{ github.event.inputs.cleanup_old }}"
          FOLDER="${{ github.event.inputs.folder_name }}"

          if [ ! -f "$TEMP_DIR/manifest.plist" ]; then
            echo "Prepared manifest not found."
            exit 1
          fi

          if [ "$CLEANUP" = "true" ]; then
            # Only remove tracked files (keeps .git safe)
            git rm -rf . || true
            mv "$TEMP_DIR/manifest.plist" manifest.plist
            FINAL_PATH="manifest.plist"
          else
            if [ -z "$FOLDER" ]; then
              FOLDER=$(date +%Y-%m-%d_%H-%M-%S)
            fi
            mkdir -p "$FOLDER"
            mv "$TEMP_DIR/manifest.plist" "$FOLDER/manifest.plist"
            FINAL_PATH="$FOLDER/manifest.plist"
          fi

          echo "FINAL_PATH=$FINAL_PATH" >> $GITHUB_ENV

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generated manifest: $FINAL_PATH"
            git push origin generated
          fi

      - name: Create install link
        shell: bash
        run: |
          set -euo pipefail

          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/generated/${FINAL_PATH}"
          ITMS_LINK="itms-services://?action=download-manifest&url=${RAW_URL}"

          {
            echo "### Copyable Link"
            echo ""
            echo '```'
            echo "${ITMS_LINK}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
