name: Generate & Publish Manifest

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Link for the signed IPA"
        required: true
      bundleid:
        description: "the Bundle-ID of your App"
        required: true
      version:
        description: "the version your App is on"
        required: true
      appname:
        description: "the name of your App"
        required: true

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find and copy manifest
        run: |
          FILE=$(find . -name "manifest.plist" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "manifest.plist not found!"
            exit 1
          fi
          echo "Found manifest at $FILE"
          cp "$FILE" manifest_generated.plist

      - name: Replace placeholders
        run: |
          sed -i "s|put ur SIGNED DIRECT link here|${{ github.event.inputs.url }}|g" manifest_generated.plist
          sed -i "s|put the bundle id of the app here|${{ github.event.inputs.bundleid }}|g" manifest_generated.plist
          sed -i "s|put the app version here (the one in the plist, not the appstore, they dont match sometimes)|${{ github.event.inputs.version }}|g" manifest_generated.plist
          sed -i "s|put the app display name here (what shows on ur homescreen)|${{ github.event.inputs.appname }}|g" manifest_generated.plist

      - name: Move file to generated folder
        run: |
          mkdir -p generated
          mv manifest_generated.plist generated/manifest.plist

      - name: Commit generated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add generated/manifest.plist
          git commit -m "Auto generated manifest"
          git push

      - name: Generate RAW URL
        run: |
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/generated/manifest.plist"
          echo "RAW_URL=$RAW_URL" >> $GITHUB_ENV

      - name: Create itms-services link
        run: |
          ITMS_LINK="itms-services://?action=download-manifest&url=${RAW_URL}"
          echo "ITMS_LINK=$ITMS_LINK" >> $GITHUB_ENV

      - name: Shorten with TinyURL
        run: |
          SHORT_URL=$(curl -s "https://tinyurl.com/api-create.php?url=${ITMS_LINK}")
          echo "SHORT_URL=$SHORT_URL" >> $GITHUB_ENV

      - name: Output Links
        run: |
          echo "=============================="
          echo "RAW URL:"
          echo $RAW_URL
          echo ""
          echo "ITMS Link:"
          echo $ITMS_LINK
          echo ""
          echo "Shortened Link:"
          echo $SHORT_URL
          echo "=============================="
